version: '3.8'
services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    environment:
      - OLLAMA_URL=http://ollama:11434/api/generate
    depends_on: []

  # Optional Ollama service can be added here if available
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
