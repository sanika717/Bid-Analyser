<!DOCTYPE html>
<html>
<head>
    <title>PROT11 Dashboard</title>

    <style>
        body {
            background: linear-gradient(135deg, #0a1a33, #102a54);
            font-family: 'Segoe UI';
            color: white;
            padding: 30px;
        }

        h1 {
            text-align: center;
        }

        .container {
            width: 90%;
            margin: auto;
        }

        .card {
            background: #162e59;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        input, button {
            padding: 10px;
            border-radius: 8px;
            border: none;
        }

        button {
            background: #1f6feb;
            color: white;
            cursor: pointer;
        }

        /* Progress */
        .progress {
            width: 100%;
            background: #333;
            border-radius: 10px;
            margin-top: 15px;
        }

        .bar {
            height: 20px;
            width: 0%;
            background: #1f6feb;
            border-radius: 10px;
            transition: 0.5s;
        }

        /* Vendor cards */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .vendor-card {
            background: #1c3b6b;
            padding: 15px;
            border-radius: 10px;
        }

        /* Logs */
        .logs {
            background: black;
            height: 200px;
            overflow-y: scroll;
            padding: 10px;
            font-size: 12px;
        }
    </style>
</head>

<body>

<h1>🚀 PROT11 Bid Engine</h1>

<div class="container">

    <div class="card">
        <input type="file" id="pdfs" multiple>
        <button onclick="start()">Run Engine</button>

        <div class="progress">
            <div class="bar" id="bar"></div>
        </div>

        <p id="status"></p>
    </div>

    <div class="card">
        <h3>📦 Vendors</h3>
        <div class="grid" id="vendors"></div>
    </div>

    <div class="card">
        <h3>📜 Logs</h3>
        <div class="logs" id="logs"></div>
    </div>

    <button onclick="download()">⬇ Download Output</button>

</div>

<script>

function start() {
    let files = document.getElementById("pdfs").files;
    let formData = new FormData();

    for (let f of files) {
        formData.append("pdfs", f);
    }

    fetch("/start", {
        method: "POST",
        body: formData
    });

    poll();
}

function poll() {
    let interval = setInterval(() => {
        fetch("/status")
        .then(res => res.json())
        .then(data => {

            // progress
            document.getElementById("bar").style.width = data.progress + "%";
            document.getElementById("status").innerText = data.status;

            // logs
            let logsDiv = document.getElementById("logs");
            logsDiv.innerHTML = data.logs.join("<br>");

            // vendors
            let vDiv = document.getElementById("vendors");
            vDiv.innerHTML = "";

            data.profiles.forEach(p => {
                vDiv.innerHTML += `
                    <div class="vendor-card">
                        <b>${p.vendor}</b><br>
                        Doc type: ${p.doc_type} &middot; Confidence: ${p.confidence}<br>
                        Price: ${p.commercial.price || "-"}<br>
                        Delivery: ${p.commercial.delivery_period || "-"}<br>
                        Payment: ${p.commercial.payment_terms || "-"}<br>
                        Warranty: ${p.commercial.warranty || "-"}
                    </div>
                `;
            });

            if (data.done) clearInterval(interval);
        });
    }, 1000);
}

function download() {
    window.location.href = "/download";
}

</script>

</body>
</html>
